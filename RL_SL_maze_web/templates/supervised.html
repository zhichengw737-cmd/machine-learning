<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervised Learning Playground</title>

    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/SL_scripts/SL_style.css">

    <script src="../static/SL_scripts/SL_lang/sl_en.js"></script>
    <script src="../static/SL_scripts/SL_lang/sl_zh.js"></script>
    <script src="../static/SL_scripts/sl_i18n.js"></script>

</head>
<body>
    <div class="container">
        <button id="lang-switch-btn" onclick="toggleSLLanguage()" 
            class="btn btn-secondary" 
            style="position: absolute; top: 10px; right: 10px; background-color: #0f172a; color: white;">
            繁體中文
        </button>

        <h1 class="sl-title" data-i18n="sl_title"></h1>
        <p class="subtitle" data-i18n="sl_subtitle"></p>

        <div class="playground-layout">
            <div class="left-panel">
                <div class="control-panel">
                    <div class="maze-controls">
                        <button class="btn active" data-i18n="btn_sl_maze"></button>
                        <a href="index.html" class="btn btn-secondary" data-i18n="btn_switch_rl"></a>
                    </div>
                    <div class="dashboard">
                        <div class="stat-box">
                            <span class="stat-label" data-i18n="stat_training"></span>
                            <span id="training-count" class="stat-value">0 / 3</span>
                        </div>
                        <button id="action-btn" class="btn btn-primary" data-i18n="btn_action_step1"></button>
                        <button id="reset-btn" class="btn btn-danger" data-i18n="btn_reset"></button>
                    </div>
                </div>

                <div class="narrative-box" style="border-left-color: #2563eb; background-color: #eff6ff;">
                    <p id="narrative-text" data-i18n="narrative_start"></p>
                </div>

                <div class="grid-container" style="margin: 25px auto; display: grid; gap: 2px; background-color: #cbd5e1; padding: 4px; border-radius: 8px; width: max-content;">
                    <div id="grid" class="grid"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel-section">
                    <h3 class="section-title title-top" data-i18n="dict_title"></h3>
                    <p class="section-desc" data-i18n="dict_desc"></p>
                    
                    <div class="opinion-grid">
                        <div class="opinion-card">
                            <span class="feature-label" data-i18n="feat_up"></span>
                            <span id="opinion-up" class="opinion-text">No Label Provided</span>
                        </div>
                        <div class="opinion-card">
                            <span class="feature-label" data-i18n="feat_right"></span>
                            <span id="opinion-right" class="opinion-text">No Label Provided</span>
                        </div>
                        <div class="opinion-card">
                            <span class="feature-label" data-i18n="feat_down"></span>
                            <span id="opinion-down" class="opinion-text">No Label Provided</span>
                        </div>
                        <div class="opinion-card" >
                            <span class="feature-label" data-i18n="feat_left"></span>
                            <span id="opinion-left" class="opinion-text">No Label Provided</span>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h3 class="section-title" data-i18n="log_title"></h3>
                    <div id="move-history-log" class="history-placeholder">

                    </div>
                </div>
            </div>
        </div>

        <div class="how-it-learns-section">
                <h2 class="edu-main-title" data-i18n="edu_title"></h2>
                <p class="edu-main-subtitle" data-i18n="edu_subtitle"></p>
                <p class="edu-main-subtitle" data-i18n="edu_subtitle2"></p>
            
                <div class="edu-steps-container">
                    <div class="edu-step-card">
                        <h3 data-i18n="edu_step1_title"></h3>
                        <p data-i18n="edu_step1_desc"></p>
                        <div class="memory-visual">
                            <div class="memory-slot known">→</div>
                            <div class="memory-slot known">↓</div>
                            <div class="memory-slot">?</div>
                            <div class="memory-slot">?</div>
                            
                            <div class="memory-slot generalize">
                                ⇨
                            </div>
                            <div div class="memory-slot generalize">
                                ⇓
                            </div> 
                        </div>
                       
                    </div>

                    <div class="edu-step-card">
                        <h3 data-i18n="edu_step2_title"></h3>
                        <p data-i18n="edu_step2_desc"></p>
                        <div class="memory-visual">
                            <div class="memory-slot known">→</div>
                            <div class="memory-slot known">↓</div>
                            <div class="memory-slot known">←</div>
                            <div class="memory-slot known">↑</div>

                            <div class="memory-slot generalize">
                                ⇨
                            </div>
                            <div div class="memory-slot generalize">
                                ⇓
                            </div>
                            <div class="memory-slot generalize">
                                ⇐
                            </div>
                            <div div class="memory-slot generalize">
                                ⇑
                            </div>
                        </div>
                    </div>

                    <div class="edu-step-card">
                        <h3 data-i18n="edu_step3_title"></h3>
                        <p data-i18n="edu_step3_desc"></p>
                        <div class="memory-visual mastered">
                            <div class="memory-slot mastered">→</div>
                            <div class="memory-slot mastered">↓</div>
                            <div class="memory-slot mastered">←</div>
                            <div class="memory-slot mastered">↑</div>
                            <div class="memory-goal-flag">🏆</div>

                            <div class="memory-slot generalize">
                                ⇨
                            </div>
                            <div div class="memory-slot generalize">
                                ⇓
                            </div>
                            <div class="memory-slot generalize">
                                ⇐
                            </div>
                            <div div class="memory-slot generalize">
                                ⇑
                            </div>
                        </div>
                    </div>

                    
                </div>
                 <p class="edu-main-subtitle" data-i18n="edu_step1_desc2"></p>
            </div>

        <div class="comparison-section" style="margin-top: 50px;">
            <div class="edu-header-container">
                <h2 class="comparison-table th" style="color: #1e3a8a;" data-i18n="comp_title"></h2>
                <p class="comparison-table " data-i18n="comp_subtitle"></p>
            </div>
            
            <div class="rl-core-split" style="display: flex; gap: 30px; align-items: stretch; margin-bottom: 30px;">
                <div style="flex: 1; background: #f0f9ff; padding: 25px; border-radius: 12px; border-left: 6px solid #0ea5e9;">
                    <h3 style="color: #0369a1; margin-top: 0;" data-i18n="comp_sl_title"></h3>
                    <p class="param-desc" data-i18n="comp_sl_p1">
                        
                    </p>
                    <p class="param-desc" style="margin-top: 10px;" data-i18n="comp_sl_p2">
                        
                    </p>
                </div>

                <div style="flex: 1; background: #fff1f2; padding: 25px; border-radius: 12px; border-left: 6px solid #e11d48;">
                    <h3 style="color: #be123c; margin-top: 0;" data-i18n="comp_rl_title"></h3>
                    <p class="param-desc" data-i18n="comp_rl_p1">
                        
                    </p>
                    <p class="param-desc" style="margin-top: 10px;" data-i18n="comp_rl_p2">
                        
                    </p>
                </div>
            </div>

            

        <div class="comparison-section" style="margin-top: 50px;">

            <table class="comparison-table">
                <thead>
                    <tr>
                        <th data-i18n="th_core"></th>
                        <th data-i18n="th_sl"></th>
                        <th data-i18n="th_rl"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td data-i18n="tr1_title"></td>
                        <td data-i18n="tr1_sl"> </td>
                        <td data-i18n="tr1_rl"></td>
                    </tr>
                    <tr>
                        <td data-i18n="tr2_title"></td>
                        <td data-i18n="tr2_sl"></td>
                        <td data-i18n="tr2_rl"></td>
                    </tr>
                    <tr>
                        <td data-i18n="tr3_title"></td>
                        <td data-i18n="tr3_sl"></td>
                        <td data-i18n="tr3_rl"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../static/SL_scripts/supervised.js"></script>
    <script src="../static/SL_scripts/arrow_dictionary.js"></script>
    <script src="../static/SL_scripts/button.js"></script>
    <script src="../static/SL_scripts/simulation.js"></script>


</body>
</html>
