<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinforcement Learning Playground</title>
    <link rel="stylesheet" href="../static/style.css">

    <script src="../static/lang/en.js"></script>
    <script src="../static/lang/zh.js"></script>
    <script src="../static/i18n.js"></script>
</head>
<body>
    <div class="container">
        <button id="lang-switch-btn" onclick="toggleLanguage()" 
            class="btn btn-secondary" 
            style="position: absolute; top: 10px; right: 10px; background-color: #0f172a;">
            繁體中文
        </button>
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"</p>
        
        <div class="playground-layout">
            <div class="left-panel">
                <div class="control-panel">
                    <div class="maze-controls">
                        <button id="maze1-btn" class="btn active" data-i18n="btn_maze1"></button>
                        <button id="maze2-btn" class="btn" disabled data-i18n="btn_maze2"></button>
                        <a href="supervised.html" class="btn btn-secondary" data-i18n="btn_switch_sl"></a>
                    </div>
                    <div class="dashboard">
                        <div class="stat-box">
                            <span class="stat-label" data-i18n="stat_training"></span>
                            <span id="training-count" class="stat-value">0 / 5</span>
                        </div>
                        <button id="action-btn" class="btn btn-primary" data-i18n="btn_train_step1"></button>
                        <button id="reset-btn" class="btn btn-danger" data-i18n="btn_reset"></button>
                    </div>
                </div>

                <div class="narrative-box">
                    <p id="narrative-text" data-i18n="narrative_start"></p>
                </div>

                <div class="grid-container">
                    <div id="grid" class="grid"></div>
                </div>
            </div>

            <div class="right-panel">
                <h3 data-i18n="dict_title"></h3>
                <p class="table-subtitle" data-i18n="dict_subtitle"></p>
                <table class="opinion-table">
                    <thead>
                        <tr>
                            <th data-i18n="arrow_symbol"></th>
                            <th data-i18n="current_opinion_title"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="arrow-cell">↑</td>
                            <td id="opinion-up" class="opinion-text" data-i18n="opinion_0_up"></td>
                        </tr>
                        <tr>
                            <td class="arrow-cell">→</td>
                            <td id="opinion-right" class="opinion-text" data-i18n="opinion_0_right"></td>
                        </tr>
                        <tr>
                            <td class="arrow-cell">↓</td>
                            <td id="opinion-down" class="opinion-text" data-i18n="opinion_0_down"></td>
                        </tr>
                        <tr>
                            <td class="arrow-cell">←</td>
                            <td id="opinion-left" class="opinion-text" data-i18n="opinion_0_left"></td>
                        </tr>
                    </tbody>
                </table>

                <!--<div class="reward-dashboard" style="margin-top: 20px;"> -->
                    <div class="reward-dashboard">
                        <!--<h3 style="margin-bottom: 10px;">🎯 Reward Dashboard</h3> -->
                        <h3 data-i18n="reward_title"></h3>

                    <!--<div id="reward-box" class="stat-box" style="margin-bottom: 10px;"> -->
                    <div id="reward-box" class="reward-score-card">

                        <!-- <span class="stat-label">Total Reward Points:</span>-->
                        <span class="reward-card-label" data-i18n="reward_lbl_total">Total Reward Points:</span>

                        <!--<span id="reward-value" class="stat-value" style="color: #10b981; margin-left: 5px;">0</span> -->
                        <span id="reward-value" class="reward-card-value">0</span>

                    </div>
                    
                    <!--<div class="stat-box" style="font-weight: 600; padding: 12px; background: #f8fafc;">-->
                    <div class="history-log-card">                        

                        <!--<div class="stat-label" style="margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px;">Move & Reward History:</div> -->
                        <div class="history-log-header" data-i18n="reward_th_action"></div>

                        <!--<div id="move-history-log" style="max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 13px; display: flex; flex-direction: column; gap: 4px;">-->
                        <div id="move-history-log" class="history-log-content">

                            <!--<div style="color: #64748b;">Waiting for simulation...</div>-->
                            <div class="history-placeholder" data-i18n="reward_waiting"></div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

  
        <div class="educational-section">
            <div class="edu-header-container">
                <h2 class="edu-title" data-i18n="edu-title"></h2>
                <p class="edu-subtitle" data-i18n="edu-subtitle"></p>
            </div>
            
            <div class="rl-intro-box">
                <h3>🤖 What is Reinforcement Learning (RL)?</h3>
                <p class="param-desc" data-i18n="edu_rl_desc"></p>
                <p class="param-desc" style="margin-top: 10px;" data-i18n="edu_rl_desc2"></p>
            </div>

            <hr class="edu-divider">

            <p class="edu-subtitle" style="margin-bottom: 20px; font-weight: bold; color: #1e293b;" data-i18n="edu_parameters_title"></p>

            <div class="param-grid">
                
                <div class="param-card card-episodes">
                    <h3 data-i18n="edu_episodes_title"></h3>
                    <span class="param-analogy" data-i18n="edu_episodes_analogy"></span>
                    <p class="param-desc" data-i18n="edu_episodes_desc"></p>
                </div>

                <div class="param-card card-alpha">
                    <h3 data-i18n="edu_alpha_title">(α)</h3>
                    <span class="param-analogy" data-i18n="edu_alpha_analogy"></span>
                    <p class="param-desc" data-i18n="edu_alpha_desc"></p>
                </div>

                <div class="param-card card-gamma">
                    <h3 data-i18n="edu_gamma_title"></h3>
                    <span class="param-analogy" data-i18n="edu_gamma_analogy"></span>
                    <p class="param-desc" data-i18n="edu_gamma_desc"></p>
                </div>

                <div class="param-card card-epsilon">
                    <h3 data-i18n="edu_epsilon_title"></h3>
                    <span class="param-analogy" data-i18n="edu_epsilon_analogy"></span>
                    <p class="param-desc" data-i18n="edu_epsilon_desc"></p>
                </div>
            </div>
        </div>
        

    <script src="../static/script.js"></script>
    <script src="../static/opinion_dictionary.js"></script>
    <script src="../static/simulation.js"></script>
    <script src="../static/button.js"></script>
    
</body>
</html>
